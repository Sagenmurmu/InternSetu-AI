version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: internsetu_postgres
    restart: always
    environment:
      POSTGRES_DB: internsetu_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d internsetu_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.backend
    container_name: internsetu_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/internsetu_ai
      - SECRET_KEY=change-this-secret-key-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - FRONTEND_URL=http://localhost:5173
      - ENVIRONMENT=production
      - DEBUG=false

  frontend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.frontend
      args:
        - VITE_API_URL=http://localhost:8000/api/v1
    container_name: internsetu_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
